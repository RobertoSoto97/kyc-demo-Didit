spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kycdb}
    username: ${SPRING_DATASOURCE_USERNAME:kycuser}
    password: ${SPRING_DATASOURCE_PASSWORD:kycpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

didit:
  client-id: ${DIDIT_CLIENT_ID}
  api-key: ${DIDIT_API_KEY}
  workflow-id: ${DIDIT_WORKFLOW_ID}
  callback-url: ${DIDIT_CALLBACK_URL:}
  # Nueva URL de la API de Verificación v3
  api-url: https://verification.didit.me

admin:
  username: ${ADMIN_USERNAME:-admin}
  password: ${ADMIN_PASSWORD:-admin123}

server:
  port: 8080

logging:
  level:
    com.kycdemo: DEBUG
