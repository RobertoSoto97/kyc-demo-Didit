version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kyc-postgres
    environment:
      POSTGRES_DB: kycdb
      POSTGRES_USER: kycuser
      POSTGRES_PASSWORD: kycpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kycuser -d kycdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: kyc-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kycdb
      SPRING_DATASOURCE_USERNAME: kycuser
      SPRING_DATASOURCE_PASSWORD: kycpass
      DIDIT_CLIENT_ID: ${DIDIT_CLIENT_ID}
      DIDIT_API_KEY: ${DIDIT_API_KEY}
      DIDIT_WORKFLOW_ID: ${DIDIT_WORKFLOW_ID}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: kyc-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
